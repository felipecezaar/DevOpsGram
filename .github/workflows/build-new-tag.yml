name: CI Pipeline with FluxCD Update

on:
  push:
    branches:
      - feature/flux-cd
  workflow_dispatch:

env:
  MANIFEST_PATH: k8s/deployment.yaml  # Caminho corrigido para o subdiretório
  IMAGE_NAME: felipeacezar/devopsgram

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Importante para gerar tags baseadas no git

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ vars.DOCKER_HUB_USERNAME }}
          password: ${{ vars.DOCKER_HUB_PASSWORD }}

      - name: Generate Semantic Version
        id: version
        run: |
          MAJOR=0
          MINOR=0
          PATCH=$(git rev-list --count HEAD)
          TAG="$MAJOR.$MINOR.$PATCH"
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "NEW_IMAGE=$IMAGE_NAME:$TAG" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: ${{ env.NEW_IMAGE }}
          build-args: NO_CACHE=true

      - name: Install yq
        run: |
          sudo wget -qO /usr/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/bin/yq

      - name: Update deployment manifest
        run: |
          echo "Atualizando manifesto em $MANIFEST_PATH"
          echo "Nova imagem: $NEW_IMAGE"
          
          # Atualização precisa do campo image
          yq eval -i '
            .spec.template.spec.containers[] |= 
            select(.name == "devopsgram-container").image = "'$NEW_IMAGE'"
          ' $MANIFEST_PATH
          
          echo "Verificação da alteração:"
          yq eval '.spec.template.spec.containers' $MANIFEST_PATH

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          echo "Pull repositorio Git:"
          git pull
          
          echo "Arquivos modificados:"
          git status -s
          
          git add $MANIFEST_PATH
          git commit -m "CI: Update image to $NEW_IMAGE [skip ci]"
          
          echo "Efetuando push das alterações..."
          git push