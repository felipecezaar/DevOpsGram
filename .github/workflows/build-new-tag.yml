name: CI Pipeline with FluxCD Update

on:
  push:
    branches:
      - feature/flux-cd
    paths:
      - '**'
      - '!k8s/deployment.yaml'  # Ignora alterações no manifesto
  workflow_dispatch:

env:
  MANIFEST_PATH: k8s/deployment.yaml
  IMAGE_NAME: felipeacezar/devopsgram

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ vars.DOCKER_HUB_USERNAME }}
          password: ${{ vars.DOCKER_HUB_PASSWORD }}

      - name: Generate Version from Last Tag
        id: version
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          # Obter a última tag
          git fetch --tags
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
          
          # Incrementar o PATCH
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LAST_TAG"
          NEW_PATCH=$((PATCH + 1))
          TAG="$MAJOR.$MINOR.$NEW_PATCH"
          
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "NEW_IMAGE=$IMAGE_NAME:$TAG" >> $GITHUB_ENV
          
          # Criar a tag
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: ${{ env.NEW_IMAGE }}
          build-args: NO_CACHE=true

      - name: Install yq
        run: |
          sudo wget -qO /usr/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/bin/yq

      - name: Update deployment manifest
        run: |
          git pull
          yq eval -i '
            .spec.template.spec.containers[] |= 
            select(.name == "devopsgram-container").image = "'$NEW_IMAGE'"
          ' $MANIFEST_PATH

      - name: Commit and push manifest changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git pull
          git add $MANIFEST_PATH
          git commit -m "CI: Update image to $NEW_IMAGE [skip ci]"
          git push